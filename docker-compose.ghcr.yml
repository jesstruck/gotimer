services:
  backend:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER}/${GHCR_REPO:?set GHCR_REPO}-backend:${IMAGE_TAG:-latest}
    environment:
      TIME_ENTRIES_DB_PATH: /data/time_entries.db
    volumes:
      - backend-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER}/${GHCR_REPO:?set GHCR_REPO}-frontend:${IMAGE_TAG:-latest}
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  backend-data:
