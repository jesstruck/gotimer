name: Main Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Conventional Commits
        run: |
          FROM_SHA="${{ github.event.before }}"
          TO_SHA="${{ github.sha }}"

          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ]; then
            npx --yes @commitlint/cli@19 --last --config commitlint.config.cjs
          else
            npx --yes @commitlint/cli@19 --from "$FROM_SHA" --to "$TO_SHA" --config commitlint.config.cjs
          fi

  ci:
    name: Test and Validate
    needs: commit-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Backend tests
        working-directory: backend
        run: go test ./...

      - name: Backend static checks
        working-directory: backend
        run: go vet ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: CI=true npm test -- --watch=false

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  semantic-release:
    name: Semantic Release
    needs:
      - commit-lint
      - ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      published: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create GitHub Release Notes
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-images:
    name: Build and Push GHCR Images
    needs:
      - ci
      - semantic-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: image_names
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_EVENT_REPOSITORY_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER_LC}/${REPO_LC}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${OWNER_LC}/${REPO_LC}-frontend" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_names.outputs.backend }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push backend image
        id: backend_build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Tag backend image with release version
        if: needs.semantic-release.outputs.published == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image_names.outputs.backend }}:v${{ needs.semantic-release.outputs.version }}" \
            "${{ steps.image_names.outputs.backend }}@${{ steps.backend_build.outputs.digest }}"

      - name: Frontend image metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_names.outputs.frontend }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push frontend image
        id: frontend_build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Tag frontend image with release version
        if: needs.semantic-release.outputs.published == 'true'
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image_names.outputs.frontend }}:v${{ needs.semantic-release.outputs.version }}" \
            "${{ steps.image_names.outputs.frontend }}@${{ steps.frontend_build.outputs.digest }}"
