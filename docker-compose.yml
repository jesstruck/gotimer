services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TIME_ENTRIES_DB_PATH: /data/time_entries.db
    volumes:
      - backend-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  backend-data:
